version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: biztrack
      POSTGRES_PASSWORD: biztrack_secret
      POSTGRES_DB: biztrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biztrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://biztrack:biztrack_secret@db:5432/biztrack
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-long-random-string-in-production}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      RECEIPT_STORAGE_PATH: /app/receipts
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - receipts_data:/app/receipts

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  receipts_data:
