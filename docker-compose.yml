services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: biztrack
      POSTGRES_PASSWORD: biztrack_secret
      POSTGRES_DB: biztrack
    ports:
      - "5444:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biztrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql://biztrack:biztrack_secret@db:5432/biztrack
      RECEIPT_STORAGE_PATH: /app/receipts
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - receipts_data:/app/receipts

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  receipts_data:
